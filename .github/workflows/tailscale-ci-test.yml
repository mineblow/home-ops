name: Connect to Tailscale using GCP Secrets

on:
  workflow_dispatch:

jobs:
  tailscale-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for google-github-actions/auth

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v3

      # Authenticate to GCP with service account JSON from GitHub Secrets
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: ☁️ Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      # Fetch and parse all_secrets JSON blob from GCP
      - name: 🔓 Extract Tailscale credentials from GCP Secret
        id: secrets
        run: |
          SECRET_JSON=$(gcloud secrets versions access latest --secret=all_secrets)
          echo "TAILSCALE_CLIENT_ID=$(echo \"$SECRET_JSON\" | jq -r '.tailscale.TS_OAUTH_CLIENT_ID')" >> "$GITHUB_ENV"
          echo "TAILSCALE_CLIENT_SECRET=$(echo \"$SECRET_JSON\" | jq -r '.tailscale.TS_OAUTH_CLIENT_SECRET')" >> "$GITHUB_ENV"

      - name: 🐛 Debug secret JSON structure
        run: |
          SECRET_JSON=$(gcloud secrets versions access latest --secret=all_secrets)
          echo "===== RAW SECRET START ====="
          echo "$SECRET_JSON"
          echo "===== RAW SECRET END ====="
          echo "$SECRET_JSON" | jq .

      - name: 🔐 Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ env.TAILSCALE_CLIENT_SECRET }}
          tags: tag:github-ci
          hostname: github-ci-runner

      - name: 🧪 Ping internal Proxmox host
        run: ping -c 3 mineblow-laptop.stern-turtle.ts.net

      - name: 🧹 Disconnect from Tailscale (auto-cleanup)
        run: echo "Runner will auto-expire (ephemeral)"
