name: Weekly Packer Build (Ubuntu 24.04)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  tailscale-connect:
    uses: ./.github/workflows/tailscale-init.yml
    permissions:
      id-token: write
      contents: read
    with:
      tag: tag:github-ci
      hostname: packer-builder
    secrets:
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

  packer-build:
    needs: tailscale-connect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v3

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: ☁️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      - name: 🧠 Extract Proxmox secrets from GCP
        run: |
          RAW=$(gcloud secrets versions access latest --secret=all_secrets)
          if echo "$RAW" | grep -q '^"'; then
            JSON=$(echo "$RAW" | jq -r | jq .)
          else
            JSON="$RAW"
          fi
          echo "PROXMOX_URL=$(echo $JSON | jq -r '.proxmox.proxmox_api_url')" >> $GITHUB_ENV
          echo "PROXMOX_USER=$(echo $JSON | jq -r '.proxmox.proxmox_terraform_api_token_id')" >> $GITHUB_ENV
          echo "PROXMOX_TOKEN=$(echo $JSON | jq -r '.proxmox.proxmox_terraform_api_token_secret')" >> $GITHUB_ENV

      - name: ⚙️ Setup Packer
        uses: hashicorp/setup-packer@v2

      - name: 🛠️ Build Proxmox Template
        run: |
          packer init packer/templates/ubuntu-24.04-cloudinit.json
          packer build \
            -var proxmox_url="$PROXMOX_URL" \
            -var proxmox_username="$PROXMOX_USER" \
            -var proxmox_token="$PROXMOX_TOKEN" \
            packer/templates/ubuntu-24.04-cloudinit.json
