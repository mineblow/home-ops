name: Monthly Packer Build (Ubuntu 24.04)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 1 * *'  # 1st of every month @ 5AM UTC

jobs:
  tailscale-connect:
    uses: ./.github/workflows/tailscale-init.yml
    permissions:
      id-token: write
      contents: read
    with:
      tag: tag:github-ci
      hostname: packer-builder
    secrets:
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

  packer-build:
    needs: tailscale-connect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📎 Checkout
        uses: actions/checkout@v3

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: ☁️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      - name: 🧠 Extract Proxmox secrets from GCP
        run: |
          RAW=$(gcloud secrets versions access latest --secret=all_secrets)
          if echo "$RAW" | grep -q '^"'; then
            JSON=$(echo "$RAW" | jq -r | jq .)
          else
            JSON="$RAW"
          fi
          echo "PROXMOX_URL=$(echo $JSON | jq -r '.proxmox.proxmox_api_url')" >> $GITHUB_ENV
          echo "PROXMOX_USER=$(echo $JSON | jq -r '.proxmox.proxmox_terraform_api_token_id')" >> $GITHUB_ENV
          echo "PROXMOX_TOKEN=$(echo $JSON | jq -r '.proxmox.proxmox_terraform_api_token_secret')" >> $GITHUB_ENV

      - name: ⚙️ Setup Packer
        uses: hashicorp/setup-packer@v2

      - name: 🚧 Build Proxmox Template
        run: |
          packer init packer/templates
          packer build \
            -var proxmox_url="$PROXMOX_URL" \
            -var proxmox_username="$PROXMOX_USER" \
            -var proxmox_token="$PROXMOX_TOKEN" \
            packer/templates

      - name: 🧹 Prune Old Proxmox Templates (Keep 5)
        run: |
          echo "🦜 Fetching template list from Proxmox API..."

          TOKEN=$(curl -sk -d "username=$PROXMOX_USER&password=$PROXMOX_TOKEN" \
            "$PROXMOX_URL/access/ticket" | jq -r '.data.ticket')

          CSRF=$(curl -sk -d "username=$PROXMOX_USER&password=$PROXMOX_TOKEN" \
            "$PROXMOX_URL/access/ticket" | jq -r '.data.CSRFPreventionToken')

          echo "🧹 Listing existing template VMs..."
          TEMPLATE_LIST=$(curl -sk -b "PVEAuthCookie=$TOKEN" "$PROXMOX_URL/nodes/proxmox/qemu" | \
            jq -r '.data[] | select(.template == 1 and .name | startswith("ubuntu-24.04-cloudinit")) | "\(.vmid) \(.name) \(.ctime)"' | \
            sort -k3 -nr)

          echo "$TEMPLATE_LIST" | tail -n +6 | while read -r VMID NAME _; do
            echo "🔥 Deleting old template: $NAME (VMID $VMID)"
            curl -sk -X DELETE -b "PVEAuthCookie=$TOKEN" -H "CSRFPreventionToken: $CSRF" \
              "$PROXMOX_URL/nodes/proxmox/qemu/$VMID"
          done
