apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm  # ✅ Official Helm Chart Repo
    chart: argo-cd  # ✅ Chart name inside their repo
    targetRevision: 5.51.3  # ✅ Ensure this matches a valid version
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/mineblow/home-ops/main/kubernetes/argocd/values.yaml  # ✅ RAW URL to `values.yaml`
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/selector
