apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm  # 🔥 Official ArgoCD Helm chart repo
      chart: argo-cd
      targetRevision: 5.51.3
    - repoURL: https://github.com/mineblow/home-ops.git  # 🔥 Your Git repo containing values.yaml
      targetRevision: main  # Adjust if using a different branch
      path: kubernetes/argocd # Path to your values.yaml in the repo
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/selector
  helm:
    valueFiles:
      - values.yaml  # 🔥 Now it knows to pull from your Git repo
